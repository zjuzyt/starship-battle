<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星际战舰</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="游戏状态">
        <div>
          <span class="hud-label">分数</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="hud-label">等级</span>
          <strong id="level">1</strong>
        </div>
        <div>
          <span class="hud-label">经验</span>
          <strong id="xp">0/120</strong>
        </div>
        <div>
          <span class="hud-label">生命</span>
          <strong id="lives">3</strong>
        </div>
        <div>
          <span class="hud-label">射线</span>
          <strong id="beams">1</strong>
        </div>
        <div>
          <span class="hud-label">复活</span>
          <strong id="revives">1</strong>
        </div>
        <div>
          <span class="hud-label">波次</span>
          <strong id="wave">1</strong>
        </div>
        <button id="pauseBtn" type="button" aria-label="暂停或继续">暂停</button>
      </section>

      <section class="stage" aria-label="星际战舰游戏区域">
        <canvas id="gameCanvas" width="960" height="600"></canvas>
        <div id="overlay" class="overlay">
          <h1>星际战舰</h1>
          <p>方向键或 WASD 移动，空格发射，躲开陨石和敌舰火力。</p>
          <button id="startBtn" type="button">开始游戏</button>
        </div>
      </section>

      <section class="controls" aria-label="触屏控制">
        <div class="dpad">
          <button data-move="up" aria-label="向上">▲</button>
          <button data-move="left" aria-label="向左">◀</button>
          <button data-move="down" aria-label="向下">▼</button>
          <button data-move="right" aria-label="向右">▶</button>
        </div>
        <button id="fireBtn" class="fire" type="button">发射</button>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
